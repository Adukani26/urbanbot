

services:
  redis:
    image: redis:7-alpine
    container_name: urbanbot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: urbanbot_postgres
    environment:
      POSTGRES_USER: urbanbot
      POSTGRES_PASSWORD: urbanbot_secret
      POSTGRES_DB: urbanbot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: urbanbot_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  api:
    build: ./backend
    container_name: urbanbot_api
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://urbanbot:urbanbot_secret@postgres:5432/urbanbot_db
      MQTT_BROKER: mqtt://mosquitto:1883
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
      - mosquitto
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: urbanbot_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: